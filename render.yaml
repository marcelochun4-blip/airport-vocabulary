services:
  - type: web
    name: workout-journal
    runtime: node
    rootDir: workout-journal
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: workout-data
      mountPath: /data
      sizeGB: 5

  - type: web
    name: study-dashboard
    runtime: node
    rootDir: study-dashboard
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: study-data
      mountPath: /data
      sizeGB: 1
