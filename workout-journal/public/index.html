<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운동 일지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --accent: #ff6b35;
      --accent2: #ff8c5a;
      --text: #f0f0f5;
      --muted: #888899;
      --green: #4ecb71;
      --blue: #5b8cff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1a1a22 0%, #0f0f1a 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .admin-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: all 0.2s;
    }

    .admin-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Stats bar */
    .stats-section {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .stats-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 24px;
      display: flex;
      gap: 0;
    }

    .stat-item {
      flex: 1;
      text-align: center;
      padding: 12px;
      position: relative;
    }

    .stat-item + .stat-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: var(--border);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-value.orange { color: var(--accent); }
    .stat-value.green { color: var(--green); }
    .stat-value.blue { color: var(--blue); }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Main content */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Month filter */
    .month-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .month-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .month-btn:hover { color: var(--text); border-color: var(--muted); }
    .month-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Timeline */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .workout-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .workout-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }

    .date-block {
      text-align: center;
      min-width: 48px;
    }

    .date-day {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
    }

    .date-month {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .date-weekday {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .card-meta {
      flex: 1;
    }

    .workout-type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-notes {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .duration-badge {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Photo grid */
    .photo-grid {
      display: grid;
      gap: 3px;
    }

    .photo-grid.count-1 { grid-template-columns: 1fr; }
    .photo-grid.count-2 { grid-template-columns: 1fr 1fr; }
    .photo-grid.count-3 { grid-template-columns: 1fr 1fr; }
    .photo-grid.count-3 .photo-item:first-child { grid-column: 1 / -1; }
    .photo-grid.count-many { grid-template-columns: repeat(3, 1fr); }

    .photo-item {
      aspect-ratio: 4/3;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .photo-grid.count-1 .photo-item { aspect-ratio: 16/9; }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .photo-item:hover img { transform: scale(1.05); }

    .photo-more-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--text); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 95vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 28px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    /* Type badge colors */
    .badge-헬스, .badge-웨이트 { background: rgba(255,107,53,0.15); color: #ff6b35; }
    .badge-러닝, .badge-달리기 { background: rgba(78,203,113,0.15); color: #4ecb71; }
    .badge-자전거 { background: rgba(91,140,255,0.15); color: #5b8cff; }
    .badge-수영 { background: rgba(52,211,235,0.15); color: #34d3eb; }
    .badge-요가 { background: rgba(168,85,247,0.15); color: #a855f7; }
    .badge-필라테스 { background: rgba(236,72,153,0.15); color: #ec4899; }
    .badge-등산 { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .badge-운동 { background: rgba(148,163,184,0.15); color: #94a3b8; }
    .badge-default { background: rgba(148,163,184,0.15); color: #94a3b8; }

    @media (max-width: 600px) {
      .stats-inner { padding: 16px; }
      .stat-value { font-size: 24px; }
      main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">💪</div>
      <span>운동 일지</span>
    </div>
    <a href="/admin" class="admin-link">관리자</a>
  </div>
</header>

<div class="stats-section">
  <div class="stats-inner">
    <div class="stat-item">
      <div class="stat-value orange" id="stat-total">-</div>
      <div class="stat-label">총 운동 횟수</div>
    </div>
    <div class="stat-item">
      <div class="stat-value green" id="stat-streak">-</div>
      <div class="stat-label">연속 운동 🔥</div>
    </div>
    <div class="stat-item">
      <div class="stat-value blue" id="stat-month">-</div>
      <div class="stat-label">이번 달</div>
    </div>
  </div>
</div>

<main>
  <div class="month-filter" id="month-filter"></div>
  <div id="timeline" class="timeline">
    <div class="loading">
      <div class="spinner"></div>
      <div>불러오는 중...</div>
    </div>
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1, event)">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1, event)">›</button>
</div>

<script>
  let allWorkouts = [];
  let currentFilter = 'all';
  let lightboxPhotos = [];
  let lightboxIndex = 0;

  const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  async function loadWorkouts() {
    try {
      const res = await fetch('/api/workouts');
      allWorkouts = await res.json();
      updateStats();
      buildMonthFilter();
      renderTimeline();
    } catch (e) {
      document.getElementById('timeline').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">불러오기 실패</div></div>';
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allWorkouts.length;

    // 이번 달
    const now = new Date();
    const thisMonth = allWorkouts.filter(w => {
      const d = new Date(w.date);
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }).length;
    document.getElementById('stat-month').textContent = thisMonth;

    // 연속 운동 계산
    const dates = [...new Set(allWorkouts.map(w => w.date))].sort().reverse();
    let streak = 0;
    let check = new Date();
    check.setHours(0,0,0,0);
    for (const d of dates) {
      const wd = new Date(d);
      wd.setHours(0,0,0,0);
      const diff = Math.round((check - wd) / 86400000);
      if (diff <= 1) { streak++; check = wd; }
      else break;
    }
    document.getElementById('stat-streak').textContent = streak + '일';
  }

  function buildMonthFilter() {
    const months = [...new Set(allWorkouts.map(w => w.date.slice(0, 7)))].sort().reverse();
    const container = document.getElementById('month-filter');
    container.innerHTML = '';

    if (months.length === 0) return;

    const allBtn = document.createElement('button');
    allBtn.className = 'month-btn active';
    allBtn.textContent = '전체';
    allBtn.onclick = () => setFilter('all', allBtn);
    container.appendChild(allBtn);

    months.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'month-btn';
      const [y, mo] = m.split('-');
      btn.textContent = y + '년 ' + parseInt(mo) + '월';
      btn.onclick = () => setFilter(m, btn);
      container.appendChild(btn);
    });
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTimeline();
  }

  function renderTimeline() {
    const container = document.getElementById('timeline');
    const filtered = currentFilter === 'all'
      ? allWorkouts
      : allWorkouts.filter(w => w.date.startsWith(currentFilter));

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🏃</div>
          <div class="empty-title">아직 운동 기록이 없습니다</div>
          <p>관리자 페이지에서 첫 운동을 기록해보세요!</p>
        </div>`;
      return;
    }

    container.innerHTML = '';
    filtered.forEach(workout => {
      container.appendChild(buildCard(workout));
    });
  }

  function buildCard(workout) {
    const d = new Date(workout.date + 'T00:00:00');
    const day = d.getDate();
    const month = MONTHS[d.getMonth()];
    const weekday = WEEKDAYS[d.getDay()] + '요일';

    const card = document.createElement('div');
    card.className = 'workout-card';

    const badgeClass = 'badge-' + (workout.type || '운동');

    let photosHtml = '';
    if (workout.photos && workout.photos.length > 0) {
      const photos = workout.photos;
      const count = photos.length;
      const gridClass = count === 1 ? 'count-1' : count === 2 ? 'count-2' : count === 3 ? 'count-3' : 'count-many';
      const showMax = count <= 4 ? count : 4;

      let items = '';
      for (let i = 0; i < showMax; i++) {
        const isLast = i === showMax - 1 && count > showMax;
        items += `<div class="photo-item" onclick="openLightbox('${workout.id}', ${i})">
          <img src="${photos[i]}" alt="운동 사진" loading="lazy">
          ${isLast ? `<div class="photo-more-overlay">+${count - showMax + 1}</div>` : ''}
        </div>`;
      }

      photosHtml = `<div class="photo-grid ${gridClass}">${items}</div>`;
    }

    const duration = workout.duration ? `<span class="duration-badge">⏱ ${workout.duration}</span>` : '';
    const notes = workout.notes ? `<div class="card-notes">${escapeHtml(workout.notes)}</div>` : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="date-block">
          <div class="date-day">${day}</div>
          <div class="date-month">${month}</div>
          <div class="date-weekday">${weekday}</div>
        </div>
        <div class="card-meta">
          <div class="workout-type-badge ${badgeClass}">${escapeHtml(workout.type || '운동')}</div>
          ${notes}
        </div>
        ${duration}
      </div>
      ${photosHtml}
    `;

    // lightbox 데이터 저장
    card.dataset.photos = JSON.stringify(workout.photos || []);
    card.dataset.id = workout.id;

    return card;
  }

  function openLightbox(workoutId, photoIndex) {
    const card = document.querySelector(`[data-id="${workoutId}"]`);
    lightboxPhotos = JSON.parse(card.dataset.photos);
    lightboxIndex = photoIndex;
    showLightboxPhoto();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showLightboxPhoto() {
    document.getElementById('lightbox-img').src = lightboxPhotos[lightboxIndex];
  }

  function navLightbox(dir, e) {
    if (e) e.stopPropagation();
    lightboxIndex = (lightboxIndex + dir + lightboxPhotos.length) % lightboxPhotos.length;
    showLightboxPhoto();
  }

  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox({target: document.getElementById('lightbox')});
    if (e.key === 'ArrowLeft') navLightbox(-1, null);
    if (e.key === 'ArrowRight') navLightbox(1, null);
  });

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadWorkouts();
</script>
</body>
</html>
